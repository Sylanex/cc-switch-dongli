name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: universal-apple-darwin
            bundles: app,dmg,updater
          - os: windows-2022
            target: ''
            bundles: msi,updater
          - os: ubuntu-22.04
            target: ''
            bundles: appimage,deb,rpm,updater

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS targets
        if: runner.os == 'macOS'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -eux
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config curl wget file patchelf rpm elfutils xdg-utils \
            libssl-dev libgtk-3-dev librsvg2-dev libayatana-appindicator3-dev
          sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.1-dev \
            || sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.0-dev
          sudo apt-get install -y --no-install-recommends libsoup-3.0-dev \
            || sudo apt-get install -y --no-install-recommends libsoup2.4-dev

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.12.3
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Decode Tauri signing key
        shell: bash
        env:
          KEY_B64: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "$KEY_B64" ]; then
            echo "❌ TAURI_SIGNING_PRIVATE_KEY secret is empty/unset" >&2
            echo "Add it at: Settings → Secrets and variables → Actions" >&2
            exit 1
          fi
          # Decode the base64-encoded raw key file content and inject as env var.
          KEY_RAW=$(printf '%s' "$KEY_B64" | (base64 --decode 2>/dev/null || base64 -D))
          echo "TAURI_SIGNING_PRIVATE_KEY<<EOF_KEY" >> "$GITHUB_ENV"
          echo "$KEY_RAW" >> "$GITHUB_ENV"
          echo "EOF_KEY" >> "$GITHUB_ENV"
          echo "TAURI_SIGNING_PRIVATE_KEY_PASSWORD=" >> "$GITHUB_ENV"

      - name: Build Tauri App
        shell: bash
        timeout-minutes: 45
        run: |
          set -eu
          if [ -n "${{ matrix.target }}" ]; then
            pnpm tauri build --target "${{ matrix.target }}" --bundles "${{ matrix.bundles }}"
          else
            pnpm tauri build --bundles "${{ matrix.bundles }}"
          fi

      - name: Collect artifacts
        shell: bash
        run: |
          set -eux
          mkdir -p release-assets
          # Tauri bundler names files based on productName, so they're already
          # "DongliAI-Switch_..." — just copy them as-is.
          case "$RUNNER_OS" in
            macOS)
              find src-tauri/target -type f \( \
                -name "*.dmg" -o \
                -name "*.app.tar.gz" -o \
                -name "*.app.tar.gz.sig" \
              \) -exec cp {} release-assets/ \;
              ;;
            Windows)
              find src-tauri/target -type f \( \
                -name "*.msi" -o \
                -name "*.msi.sig" \
              \) -exec cp {} release-assets/ \;
              ;;
            Linux)
              find src-tauri/target -type f \( \
                -name "*.AppImage" -o \
                -name "*.AppImage.sig" -o \
                -name "*.deb" -o \
                -name "*.rpm" \
              \) -exec cp {} release-assets/ \;
              ;;
          esac
          ls -la release-assets/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.os }}
          path: release-assets/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-22.04
    needs: build
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true

      - name: List collected assets
        run: ls -la release-assets/

      - name: Generate latest.json
        env:
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          set -eu
          VERSION="${TAG#v}"
          PUB_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          BASE_URL="https://github.com/$REPO/releases/download/$TAG"

          mac_url=""; mac_sig=""
          win_url=""; win_sig=""
          linux_url=""; linux_sig=""

          shopt -s nullglob
          for sig in release-assets/*.sig; do
            base="${sig%.sig}"
            fname=$(basename "$base")
            url="$BASE_URL/$fname"
            content=$(cat "$sig")
            case "$fname" in
              *.app.tar.gz) mac_url="$url"; mac_sig="$content" ;;
              *.msi)        win_url="$url"; win_sig="$content" ;;
              *.AppImage)   linux_url="$url"; linux_sig="$content" ;;
            esac
          done

          {
            echo '{'
            echo "  \"version\": \"$VERSION\","
            echo "  \"notes\": \"Release $TAG\","
            echo "  \"pub_date\": \"$PUB_DATE\","
            echo '  "platforms": {'
            first=1
            if [ -n "$mac_url" ]; then
              for key in darwin-aarch64 darwin-x86_64; do
                [ $first -eq 0 ] && echo ','
                echo "    \"$key\": {\"signature\": \"$mac_sig\", \"url\": \"$mac_url\"}"
                first=0
              done
            fi
            if [ -n "$win_url" ]; then
              [ $first -eq 0 ] && echo ','
              echo "    \"windows-x86_64\": {\"signature\": \"$win_sig\", \"url\": \"$win_url\"}"
              first=0
            fi
            if [ -n "$linux_url" ]; then
              [ $first -eq 0 ] && echo ','
              echo "    \"linux-x86_64\": {\"signature\": \"$linux_sig\", \"url\": \"$linux_url\"}"
              first=0
            fi
            echo ''
            echo '  }'
            echo '}'
          } > release-assets/latest.json
          echo "=== Generated latest.json ==="
          cat release-assets/latest.json

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: "DongliAI-Switch ${{ github.ref_name }}"
          prerelease: ${{ contains(github.ref_name, '-') }}
          body: |
            ## DongliAI-Switch ${{ github.ref_name }}

            慧境冻梨AICode 一键管理 Claude Code / Codex / Gemini CLI / OpenClaw / OpenCode / Hermes 的桌面客户端。

            ### 下载

            - **macOS** (Universal — Intel + Apple Silicon): `.dmg`
            - **Windows**: `.msi`
            - **Linux**: `.AppImage` / `.deb` / `.rpm`

            ### macOS 首次安装

            因暂未购买 Apple Developer 证书，首次打开需 **右键 → 打开** 绕过 GateKeeper；第二次起正常双击。

            ### 自动更新

            已安装的客户在下一版本发布后会自动收到提示，无需重新下载安装包。

            > `.sig` / `latest.json` 文件供自动更新机制使用，普通用户无需下载。
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
